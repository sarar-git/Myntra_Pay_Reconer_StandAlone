<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Myntra Payment Register</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="container">

        <h1>Myntra Payment Register</h1>

        <p>
            Upload the Myntra Revamped Payment Report
        </p>

        <input
            type="file"
            id="excelFile"
            accept=".xlsx">

        <button id="uploadBtn">
            Generate Register
        </button>

        <div id="status"></div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
